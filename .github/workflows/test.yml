name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Type check
        run: bun run type-check

      - name: Run tests
        run: bun test
        env:
          # Mock credentials for CI - tests use mocked env vars
          LANGFUSE_PUBLIC_KEY: pk-lf-ci-test
          LANGFUSE_SECRET_KEY: sk-lf-ci-test
